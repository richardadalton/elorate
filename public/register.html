<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — League Tracker</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">🎱</div>
    <h1 class="auth-title">Create Account</h1>
    <p class="auth-sub">Join the league tracker</p>

    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="field">
        <label for="name">Display Name</label>
        <input type="text" id="name" placeholder="Your name" required maxlength="40" autocomplete="name" />
      </div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="At least 6 characters" required autocomplete="new-password" />
      </div>
      <div class="msg err" id="register-err" style="display:none"></div>
      <button type="submit" class="btn btn-full" id="register-btn">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></p>
    <p class="auth-switch"><a href="/">Continue without signing in</a></p>
  </div>
</div>

<script>
async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('register-btn');
  const err = document.getElementById('register-err');
  btn.disabled = true;
  btn.textContent = 'Creating account…';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name:     document.getElementById('name').value,
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Registration failed');
    window.location.href = '/';
  } catch (ex) {
    err.textContent = ex.message;
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
